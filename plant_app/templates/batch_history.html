<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batch {{ batch_number }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="brand"><img src="/static/logo.png" class="logo" alt="Lonza">Batch {{ batch_number }}</div>
    <div class="navlinks">
      <a class="pill" href="/plant">Plant Status</a>
      <a class="pill" href="/dashboard">Dashboard</a>
      <a class="pill" href="/logout">Logout</a>
      <span class="pill">User: {{ user }}</span>
    </div>
  </div>

  <div class="card">
    <h2>Batch History</h2>
    <div class="table-wrap">
      <table class="table">
        <tr><th>Saved</th><th>Employee</th><th>Stage</th><th>Details</th></tr>
        {% for r in rows %}
        <tr>
          <td>{{ r['created_at'] }}</td>
          <td>{{ r['employee'] }}</td>
          <td>{{ r['stage'] }}</td>
          <td>{{ r['details'] }}</td>
        </tr>
        {% endfor %}
      </table>
    </div>
  </div>
</div>
</body>
</html>
