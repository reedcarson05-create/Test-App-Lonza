<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="brand">
        <img src="/static/logo.png" alt="Logo" class="logo">
        Dashboard
      </div>
      <div class="navlinks">
        <a class="pill" href="/machines">Stages</a>
        <a class="pill" href="/plant">Plant Status</a>
        <span class="pill">User: {{ user }}</span>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Batch Dashboard</h2>
      <div class="footer">Most recent batches first.</div>

      <table class="table" style="margin-top:12px;">
        <tr>
          <th>Batch</th>
          <th>Last Seen</th>
          <th>Entries</th>
        </tr>
        {% for b in batches %}
        <tr>
          <td><a href="/batch/{{ b['batch_number'] }}">{{ b["batch_number"] }}</a></td>
          <td>{{ b["last_seen"] }}</td>
          <td>{{ b["entry_count"] }}</td>
        </tr>
        {% endfor %}
      </table>
    </div>
  </div>
</body>
</html>
