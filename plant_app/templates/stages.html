<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stage Selection</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="brand">
        <img src="/static/logo.png" alt="Logo" class="logo">
        Stage Selection
      </div>
      <div class="navlinks">
        <a class="pill" href="/dashboard">Dashboard</a>
        <span class="pill">User: {{ user }}</span>
        <a class="pill" href="/logout">Logout</a>
      </div>
    </div>

    <div class="card">
      <h2>Select Data Sheet</h2>
      <div class="footer">Start with Extraction. Filtration and Evaporation will be built next.</div>

      <div class="grid grid-3" style="margin-top:14px;">
        <a class="btn btn-big" href="/stage/extraction">Extraction</a>
        <a class="btn btn-big" href="/stage/filtration">Filtration</a>
        <a class="btn btn-big" href="/stage/evaporation">Evaporation</a>
      </div>
    </div>
  </div>

</html>
