<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extraction</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="brand"><img src="/static/logo.png" class="logo" alt="Lonza">Extraction Data Entry</div>
    <div class="navlinks">
      <a class="pill" href="/stages">Stages</a>
      <a class="pill" href="/dashboard">Dashboard</a>
      <a class="pill" href="/logout">Logout</a>
      {% if batch %}
      <span class="pill">Batch: {{ batch['batch_number'] }}</span>
      {% else %}
      <span class="pill">No Batch Required</span>
      {% endif %}
    </div>
  </div>

  <form method="post" action="/submit/extraction" class="stack-gap">
    <div class="card">
      <h2>Header Information</h2>
      <div class="grid three-up">
        <div><label>Batch Context</label><input value="{% if batch %}{{ batch['batch_number'] }}{% else %}No batch required{% endif %}" disabled></div>
        <div><label>Date</label><input type="date" name="entry_date" value="{{ today }}"></div>
        <div><label>Time</label><input type="time" name="entry_time"></div>
        <div><label>Handwritten Initials</label><input name="operator_initials" value="{{ initials }}"></div>
        <div>
          <label>North / South / Pile</label>
          <input name="location" list="extraction-locations" value="Pile">
          <datalist id="extraction-locations">
            <option value="Pile">
            <option value="North">
            <option value="South">
          </datalist>
        </div>
        <div><label>Time on Pipe or Pile</label><input name="time_on_pipe_or_pile"></div>
        <div><label>Start Time</label><input type="time" name="start_time"></div>
        <div><label>Stop Time</label><input type="time" name="stop_time"></div>
      </div>
    </div>

    <div class="card">
      <h2>Machine Readings</h2>
      <div class="grid three-up">
        <div><label>PSF 1 Speed</label><input name="psf1_speed"></div>
        <div><label>PSF 1 Load</label><input name="psf1_load"></div>
        <div><label>PSF 1 Blowback</label><input name="psf1_blowback"></div>
        <div><label>PSF 2 Speed</label><input name="psf2_speed"></div>
        <div><label>PSF 2 Load</label><input name="psf2_load"></div>
        <div><label>PSF 2 Blowback</label><input name="psf2_blowback"></div>
        <div><label>Press Speed</label><input name="press_speed"></div>
        <div><label>Press Load</label><input name="press_load"></div>
        <div><label>Press Blowback</label><input name="press_blowback"></div>
        <div><label>Pressate RI</label><input name="pressate_ri"></div>
        <div><label>Chip Bin Steam</label><input name="chip_bin_steam"></div>
        <div><label>Chip Chute Temp</label><input name="chip_chute_temp"></div>
      </div>
    </div>

    <div class="card">
      <label>Notes</label>
      <textarea name="notes" rows="4"></textarea>
    </div>

    <div class="actions">
      <button class="btn" type="submit">Save Extraction</button>
      <a class="btn ghost" href="/stages">Back</a>
    </div>
  </form>
</div>
</body>
</html>
