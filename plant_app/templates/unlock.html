<!doctype html>
<html data-theme="{{ settings_theme }}" style="--font-scale: {{ settings_font_scale }};">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unlock Plant App</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
  <link rel="icon" type="image/png" href="/static/logo.png?v={{ asset_version }}">
</head>
<body class="login-page" data-settings-theme="{{ settings_theme }}" data-settings-font-scale="{{ settings_font_scale }}" data-settings-persist="false">
  <div class="wrap narrow">
    <div class="card login-card">
      <div class="login-logo"><img src="/static/logo.png?v={{ asset_version }}" alt="LAG"></div>
      <p class="eyebrow center">Plant Operations</p>
      <h1>Quick Unlock</h1>
      <p class="muted center">Session remembered for <strong>{{ remembered_user }}</strong>. Enter the 4-digit passcode to continue.</p>
      <div class="login-meta">
        <span class="info-chip">Fast Resume</span>
        <span class="info-chip">Same Session</span>
        <span class="info-chip">Logout Clears Access</span>
      </div>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post" action="/unlock" class="stack">
        <div>
          <label>4-Digit Passcode</label>
          <input type="password" name="quick_code" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" minlength="4" required autofocus autocomplete="one-time-code" placeholder="0000">
        </div>
        <button class="btn" type="submit" data-loading-label="Unlocking...">Unlock</button>
      </form>
      <p class="muted center" style="margin-top: 1rem;">Need a different account? <a href="/logout">Log out</a></p>
    </div>
  </div>
  <script src="/static/settings.js?v={{ asset_version }}"></script>
</body>
</html>
