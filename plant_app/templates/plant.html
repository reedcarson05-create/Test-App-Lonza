<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plant Status</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
    <div class="nav">
      <div class="brand"><img src="/static/logo.png" class="logo" alt="Lonza">Plant Status</div>
      <div class="navlinks">
        <a class="pill" href="/batch/select">Batches</a>
        <a class="pill" href="/dashboard">Dashboard</a>
        <a class="pill" href="/logout">Logout</a>
        <span class="pill">User: {{ user }}</span>
      </div>
    </div>

  <div class="card">
    <h2>Batch Status</h2>
    <div class="table-wrap">
      <table class="table">
        <tr><th>Batch</th><th>Status</th><th>Last Updated</th></tr>
        {% for r in rows %}
        <tr>
          <td><a href="/batch/{{ r['batch_number'] }}">{{ r['batch_number'] }}</a></td>
          <td>{{ r['status'] }}</td>
          <td>{{ r['last_seen'] }}</td>
        </tr>
        {% endfor %}
      </table>
    </div>
  </div>
</div>
</body>
</html>
