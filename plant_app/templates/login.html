<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lonza Operator Login</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
</head>
<body class="login-page">
  <!-- Login screen for authenticating operators before they enter plant data. -->
  <div class="wrap narrow">
    <div class="card login-card">
      <div class="login-logo"><img src="/static/logo.png" alt="Lonza"></div>
      <p class="eyebrow center">Plant Operations</p>
      <h1>Operator Login</h1>
      <p class="muted center">Secure sign-in for batch setup, process sheets, and correction history.</p>
      <div class="login-meta">
        <span class="info-chip">Batch Setup</span>
        <span class="info-chip">Process Sheets</span>
        <span class="info-chip">Change History</span>
      </div>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post" action="/login" class="stack">
        <div>
          <label>Employee Number</label>
          <input name="employee" required autocomplete="username">
        </div>
        <div>
          <label>Password</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
