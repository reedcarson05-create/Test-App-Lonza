<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lonza Operator Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap narrow">
    <div class="card login-card">
      <div class="login-logo"><img src="/static/logo.png" alt="Lonza"></div>
      <h1>Operator Login</h1>
      <p class="muted center">Use your employee number to enter the plant data app.</p>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post" action="/login" class="stack">
        <div>
          <label>Employee Number</label>
          <input name="employee" required autocomplete="username">
        </div>
        <div>
          <label>Password</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
      <p class="muted center small">Demo login: 1001 / test123</p>
    </div>
  </div>
</body>
</html>
