<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operator Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="card" style="max-width:560px; margin:30px auto;">
      <div class="login-logo">
        <img src="/static/logo.png" alt="Company Logo">
      </div>

      <h2 style="text-align:center;">Operator Login</h2>
      <div class="footer" style="text-align:center; margin-bottom:14px;">
        Enter employee number and password to continue.
      </div>

      <form method="post" action="/login">
        <label>Employee Number</label>
        <input name="employee" required>

        <div style="height:12px;"></div>

        <label>Password</label>
        <input type="password" name="password" required>

        <div style="height:14px;"></div>

        <button class="btn btn-big" type="submit" style="width:100%;">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
