<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lonza Operator Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-settings-theme="{{ settings_theme }}" data-settings-font-scale="{{ settings_font_scale }}" data-settings-persist="false" data-settings-endpoint="/settings">
  <div class="settings-root">
    <button class="settings-toggle" type="button" data-settings-toggle aria-expanded="false" aria-controls="settings-panel">Settings</button>
    <div class="settings-panel" id="settings-panel" data-settings-panel hidden>
      <p class="settings-title">Display Settings</p>
      <p class="settings-copy muted">Choose a theme and text size that feels comfortable.</p>
      <div class="settings-group">
        <span class="settings-label">Theme</span>
        <div class="settings-options">
          <button class="settings-option" type="button" data-theme-choice="light">Light</button>
          <button class="settings-option" type="button" data-theme-choice="dark">Dark</button>
        </div>
      </div>
      <div class="settings-group">
        <span class="settings-label">Text Size</span>
        <div class="settings-options">
          <button class="settings-option" type="button" data-font-choice="1">Standard</button>
          <button class="settings-option" type="button" data-font-choice="1.15">Large</button>
          <button class="settings-option" type="button" data-font-choice="1.3">Largest</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Login screen for authenticating operators before they enter plant data. -->
  <div class="wrap narrow">
    <div class="card login-card">
      <div class="login-logo"><img src="/static/logo.png" alt="Lonza"></div>
      <h1>Operator Login</h1>
      <p class="muted center">Use your employee number to enter the plant data app.</p>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post" action="/login" class="stack">
        <div>
          <label>Employee Number</label>
          <input name="employee" required autocomplete="username">
        </div>
        <div>
          <label>Password</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
    </div>
  </div>
<script src="/static/settings.js"></script>
</body>
</html>
