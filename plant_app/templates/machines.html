<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stages</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="brand">
        <img src="/static/logo.png" alt="Logo" class="logo">
        Plant Operator
      </div>
      <div class="navlinks">
        <a class="pill" href="/dashboard">Dashboard</a>
        <a class="pill" href="/plant">Plant Status</a>
        <span class="pill">User: {{ user }}</span>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Select Stage</h2>
      <div class="footer">Tap targets for tablet use.</div>

      <div class="grid grid-3" style="margin-top:14px;">
        {% for m in machines %}
          <a class="btn btn-big" href="/entry/{{ m.MachineID }}" style="text-decoration:none;">
            {{ m.Name }}
          </a>
        {% endfor %}
      </div>
    </div>
  </div>
</body>
</html>
