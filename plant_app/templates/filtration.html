<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Filtration</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="brand"><img src="/static/logo.png" class="logo" alt="Lonza">Filtration Data Entry</div>
    <div class="navlinks">
      <a class="pill" href="/stages">Stages</a>
      <a class="pill" href="/dashboard">Dashboard</a>
      <a class="pill" href="/logout">Logout</a>
      {% if batch %}
      <span class="pill">Batch: {{ batch['batch_number'] }}</span>
      {% else %}
      <span class="pill">No Batch Required</span>
      {% endif %}
    </div>
  </div>

  <form method="post" action="/submit/filtration" class="stack-gap">
    <div class="card">
      <h2>Header Information</h2>
      <div class="grid three-up">
        <div><label>Batch Context</label><input value="{% if batch %}{{ batch['batch_number'] }}{% else %}No batch required{% endif %}" disabled></div>
        <div><label>Date</label><input type="date" name="entry_date" value="{{ today }}"></div>
        <div><label>Handwritten Initials</label><input name="operator_initials" value="{{ initials }}"></div>
        <div><label>Clarification Sequential No.</label><input name="clarification_sequential_no"></div>
        <div><label>Retentate Flow Set Point</label><input name="retentate_flow_set_point"></div>
        <div><label>Zero Refract</label><select name="zero_refract"><option value=""></option><option>Y</option><option>N</option></select></div>
        <div><label>Start-up Time</label><input type="time" name="startup_time"></div>
        <div><label>Shut-down Time</label><input type="time" name="shutdown_time"></div>
      </div>
    </div>

    <div class="card">
      <h2>Filtration Readings</h2>
      <div class="table-wrap">
        <table class="table entry-table">
          <tr><th>Time</th><th>Feed RI</th><th>Retentate RI</th><th>Permeate RI</th><th>Perm Flow C</th><th>Perm Flow D</th></tr>
          <tr><td><input name="row1_time"></td><td><input name="row1_feed_ri"></td><td><input name="row1_retentate_ri"></td><td><input name="row1_permeate_ri"></td><td><input name="row1_perm_flow_c"></td><td><input name="row1_perm_flow_d"></td></tr>
          <tr><td><input name="row2_time"></td><td><input name="row2_feed_ri"></td><td><input name="row2_retentate_ri"></td><td><input name="row2_permeate_ri"></td><td><input name="row2_perm_flow_c"></td><td><input name="row2_perm_flow_d"></td></tr>
          <tr><td><input name="row3_time"></td><td><input name="row3_feed_ri"></td><td><input name="row3_retentate_ri"></td><td><input name="row3_permeate_ri"></td><td><input name="row3_perm_flow_c"></td><td><input name="row3_perm_flow_d"></td></tr>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Diafiltration</h2>
      <div class="table-wrap">
        <table class="table entry-table">
          <tr><th>Time</th><th>Feed RI</th><th>Retentate RI</th><th>Permeate RI</th></tr>
          <tr><td><input name="dia_row1_time"></td><td><input name="dia_row1_feed_ri"></td><td><input name="dia_row1_retentate_ri"></td><td><input name="dia_row1_permeate_ri"></td></tr>
          <tr><td><input name="dia_row2_time"></td><td><input name="dia_row2_feed_ri"></td><td><input name="dia_row2_retentate_ri"></td><td><input name="dia_row2_permeate_ri"></td></tr>
        </table>
      </div>
    </div>

    <div class="card">
      <label>Notes</label>
      <textarea name="notes" rows="4"></textarea>
    </div>

    <div class="actions">
      <button class="btn" type="submit">Save Filtration</button>
      <a class="btn ghost" href="/stages">Back</a>
    </div>
  </form>
</div>
</body>
</html>
